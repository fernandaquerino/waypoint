name: waypoint

x-node-service: &node-service
  build:
    context: .
    dockerfile: Dockerfile.dev
  init: true
  working_dir: /workspace
  volumes:
    - .:/workspace
    - root_node_modules:/workspace/node_modules
    - api_node_modules:/workspace/apps/api/node_modules
    - web_node_modules:/workspace/apps/web/node_modules
    - db_node_modules:/workspace/packages/db/node_modules
    - types_node_modules:/workspace/packages/types/node_modules
    - ui_node_modules:/workspace/packages/ui/node_modules

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-waypoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-waypoint}
      POSTGRES_USER: ${POSTGRES_USER:-waypoint}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    <<: *node-service
    command: pnpm dev:api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      API_PORT: ${API_PORT:-3333}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-local-env}
      DATABASE_URL: postgresql://${POSTGRES_USER:-waypoint}:${POSTGRES_PASSWORD:-waypoint}@postgres:5432/${POSTGRES_DB:-waypoint}
      NODE_ENV: development
      PORT: ${API_PORT:-3333}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
    ports:
      - "${API_PORT:-3333}:${API_PORT:-3333}"

  web:
    <<: *node-service
    command: pnpm dev:web
    depends_on:
      api:
        condition: service_started
    environment:
      API_URL: http://api:${API_PORT:-3333}
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-local-env}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-waypoint}:${POSTGRES_PASSWORD:-waypoint}@postgres:5432/${POSTGRES_DB:-waypoint}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3333}
      NODE_ENV: development
      PORT: ${WEB_PORT:-3000}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  api_node_modules:
  db_node_modules:
  postgres_data:
  root_node_modules:
  types_node_modules:
  ui_node_modules:
  web_node_modules:
